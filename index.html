const COST_NAMES = {1:'1费英雄',2:'2费英雄',3:'3费英雄',4:'4费英雄',5:'5费英雄'};
const COST_STARS = {1:'★',2:'★★',3:'★★★',4:'★★★★',5:'★★★★★'};

// Avatar gradient colors by hero name first char for variety
function avatarGrad(name, cost) {
  const hue = (name.charCodeAt(0) * 37 + name.charCodeAt(name.length-1) * 53) % 360;
  const sat = 55 + (cost * 5);
  const light = 30 + (cost * 4);
  return `linear-gradient(135deg, hsl(${hue},${sat}%,${light}%), hsl(${(hue+40)%360},${sat+10}%,${light-10}%))`;
}

function getItemClass(item) {
  return 'item-' + (ITEM_STYLES[item] || 'util');
}

function renderHeroes(heroes) {
  const content = document.getElementById('heroContent');
  const noResults = document.getElementById('noResults');
  
  if (heroes.length === 0) {
    content.innerHTML = '';
    noResults.classList.add('show');
    return;
  }
  noResults.classList.remove('show');

  // Group by cost
  const grouped = {};
  heroes.forEach(h => {
    if (!grouped[h.cost]) grouped[h.cost] = [];
    grouped[h.cost].push(h);
  });

  let html = '';
  for (let cost = 1; cost <= 5; cost++) {
    if (!grouped[cost]) continue;
    const list = grouped[cost];
    html += `<div class="cost-section cost-${cost}">
      <div class="cost-header">
        <div class="cost-icon">${cost}</div>
        <div>
          <div class="cost-title">${COST_NAMES[cost]}</div>
          <div class="cost-stars">${COST_STARS[cost]}</div>
        </div>
        <div class="cost-count">${list.length} 位英雄</div>
      </div>
      <div class="hero-grid">`;

    list.forEach((h, i) => {
      const delay = i * 0.05;
      const firstChar = h.name.charAt(0);
      html += `<div class="hero-card" style="animation-delay:${delay}s" 
        data-cost="${h.cost}" data-role="${h.role}" data-search="${h.name} ${h.en} ${h.synergies.join(' ')} ${h.role} ${h.items.join(' ')}">
        <div class="hero-top">
          <div class="hero-avatar" style="background:${avatarGrad(h.name, h.cost)}">${firstChar}</div>
          <div class="hero-info">
            <div class="hero-name">${h.name} <span class="hero-name-en">${h.en}</span></div>
            <div class="hero-stars"><span>${COST_STARS[h.cost]}</span></div>
            <div class="role-badge">${h.role}</div>
          </div>
        </div>
        <div class="synergies">
          ${h.synergies.map(s => `<span class="synergy-tag">${s}</span>`).join('')}
        </div>
        <div class="items-section">
          <div class="items-label">▸ 推荐装备</div>
          <div class="items-list">
            ${h.items.map(item => `<div class="item-badge">
              <div class="item-icon ${getItemClass(item)}">${ITEM_ABBR[item]||'?'}</div>
              <span>${item}</span>
            </div>`).join('')}
          </div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  }
  content.innerHTML = html;
}

// Initial render
renderHeroes(HEROES);

// Search
const searchInput = document.getElementById('searchInput');
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = searchInput.value.trim().toLowerCase();
    // Reset filter buttons
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    
    if (!q) {
      renderHeroes(HEROES);
      return;
    }
    const filtered = HEROES.filter(h => {
      const searchStr = `${h.name} ${h.en} ${h.synergies.join(' ')} ${h.role} ${h.items.join(' ')}`.toLowerCase();
      return searchStr.includes(q);
    });
    renderHeroes(filtered);
  }, 200);
});

// Filter buttons
document.getElementById('filterButtons').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  searchInput.value = '';
  
  const filter = btn.dataset.filter;
  if (filter === 'all') {
    renderHeroes(HEROES);
    return;
  }
  
  // Cost filter
  if (/^[1-5]$/.test(filter)) {
    renderHeroes(HEROES.filter(h => h.cost === parseInt(filter)));
    return;
  }
  
  // Role filter
  renderHeroes(HEROES.filter(h => h.role.includes(filter)));
});

// Back to top
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 300);
});
</script>
