.container{max-width:1400px;margin:0 auto;padding:20px;position:relative;z-index:1}

header{

}
.header-inner{

}
.header-inner::before{

  pointer-events:none;
}
.header-inner::after{
  content:'★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★';
  position:absolute;bottom:0;left:0;right:0;
  text-align:center;font-size:.55em;letter-spacing:8px;
  color:rgba(200,146,42,.4);padding-bottom:6px;
}
.header-deco{

}
.header-deco-line{

}
.header-deco-icon{font-size:1.2em;color:#f0c040;animation:starFloat 3s ease-in-out infinite}
.header-deco-icon:nth-child(3){animation-delay:1s}
header h1{

  background:linear-gradient(180deg,#ffe680 0%,#f0a800 40%,#c87820 70%,#f0c840 100%);

  background-size:200% auto;
  animation:titleShine 4s linear infinite;
  text-shadow:none;
  filter:drop-shadow(0 2px 8px rgba(200,130,20,.6));
  position:relative;z-index:1;
}
.header-subtitle-wrap{

}
.season-badge{

  border:1px solid rgba(255,255,255,.2);

}
header .subtitle{

}
.stats-bar{display:none}
.search-container{

.cost-4 .cost-header{border-color:#ab47bc}
.cost-5 .cost-header{border-color:#ffc107}

.cost-1 .cost-icon{background:linear-gradient(135deg,#888,#666);color:#fff}
.cost-2 .cost-icon{background:linear-gradient(135deg,#4CAF50,#2E7D32);color:#fff}

.cost-stars{color:#ffd700;letter-spacing:2px;font-size:.9em}
.hero-grid{

.hero-card{

.back-top{

const COST_NAMES = {1:'1费英雄',2:'2费英雄',3:'3费英雄',4:'4费英雄',5:'5费英雄'};
const COST_STARS = {1:'★',2:'★★',3:'★★★',4:'★★★★',5:'★★★★★'};

// Avatar gradient colors by hero name first char for variety
function avatarGrad(name, cost) {
  const hue = (name.charCodeAt(0) * 37 + name.charCodeAt(name.length-1) * 53) % 360;
  const sat = 55 + (cost * 5);
  const light = 30 + (cost * 4);
  return `linear-gradient(135deg, hsl(${hue},${sat}%,${light}%), hsl(${(hue+40)%360},${sat+10}%,${light-10}%))`;
}

function getAvatarHtml(h, firstChar) {
  if (!h.avatar) return firstChar;
  return '<img src="' + h.avatar + '" alt="' + h.name + '" onerror="this.style.display=\'none\'">';
}
function getItemClass(item) {
  return 'item-' + (ITEM_STYLES[item] || 'util');
}
function getItemIcon(item) {
  const url = ITEM_IMAGES[item];
  if (url) return '<img src="' + url + '" alt="' + item + '">';
  return ITEM_ABBR[item] || '?';
}

function renderHeroes(heroes) {
  const content = document.getElementById('heroContent');
  const noResults = document.getElementById('noResults');
  
  if (heroes.length === 0) {
    content.innerHTML = '';
    noResults.classList.add('show');
    return;
  }
  noResults.classList.remove('show');

  // Group by cost
  const grouped = {};
  heroes.forEach(h => {
    if (!grouped[h.cost]) grouped[h.cost] = [];
    grouped[h.cost].push(h);
  });

  let html = '';
  for (let cost = 1; cost <= 5; cost++) {
    if (!grouped[cost]) continue;
    const list = grouped[cost];
    html += `<div class="cost-section cost-${cost}">
      <div class="cost-header">
        <div class="cost-icon">${cost}</div>
        <div>
          <div class="cost-title">${COST_NAMES[cost]}</div>
          <div class="cost-stars">${COST_STARS[cost]}</div>
        </div>
        <div class="cost-count">${list.length} 位英雄</div>
      </div>
      <div class="hero-grid">`;

    list.forEach((h, i) => {
      const delay = i * 0.05;
      const firstChar = h.name.charAt(0);
      html += `<div class="hero-card" style="animation-delay:${delay}s" 
        data-cost="${h.cost}" data-role="${h.role}" data-search="${h.name} ${h.en} ${h.synergies.join(' ')} ${h.role} ${h.items.join(' ')}">
        <div class="hero-top">
          <div class="hero-avatar" style="background:${avatarGrad(h.name, h.cost)}">${getAvatarHtml(h, firstChar)}</div>
          <div class="hero-info">
            <div class="hero-name">${h.name} <span class="hero-name-en">${h.en}</span></div>
            <div class="hero-stars"><span>${COST_STARS[h.cost]}</span></div>
            <div class="role-badge">${h.role}</div>
          </div>
        </div>
        <div class="synergies">
          ${h.synergies.map(s => `<span class="synergy-tag">${s}</span>`).join('')}
        </div>
        <div class="items-section">
          <div class="items-label">▸ 推荐装备</div>
          <div class="items-list">
            ${h.items.map(item => `<div class="item-badge">
              <div class="item-icon ${getItemClass(item)}">${getItemIcon(item)}</div>
              <span>${item}</span>
            </div>`).join('')}
          </div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  }
  content.innerHTML = html;
}

// ── 拼音查找表 ──────────────────────────────────────────────────────────────
const PM={'贝蕾亚':'bei lei ya','波比':'bo bi','维迦':'wei jia','凯特琳':'kai te lin','提莫':'ti mo','内瑟斯':'nei se si','崔斯特':'cui si te','泰隆':'tai long','伊泽瑞尔':'yi ze rui er','蕾欧娜':'lei ou na','丽桑卓':'li sang zhuo','雷克塞':'lei ke sai','卑尔维斯':'bei er wei si','阿卡丽':'a ka li','金克丝':'jin ke si','纳尔':'na er','派克':'pai ke','古拉加斯':'gu la jia si','格温':'ge wen','贾克斯':'jia ke si','米利欧':'mi li ou','佐伊':'zuo yi','小木灵':'xiao mu ling','莫德凯撒':'mo de kai sa','潘森':'pan sen','厄运小姐':'e yun xiao jie','俄洛伊':'e luo yi','阿萝拉':'a luo la','菲兹':'fei zi','茂凯':'mao kai','卡莎':'ka sha','厄加特':'e jia te','维克托':'wei ke tuo','莎弥拉':'sha mi la','奥恩':'ao en','璐璐':'lu lu','黛安娜':'dai an na','拉亚斯特':'la ya si te','拉莫斯':'la mo si','库奇':'ku qi','千珏':'qian jue','卡尔玛':'ka er ma','奥瑞利安·索尔':'ao rui li an suo er','超级机甲':'chao ji ji jia','易':'yi','娜美':'na mei','努努和威朗普':'nu nu he wei lang pu','锐雯':'rui wen','乐芙兰':'le fu lan','霞':'xia','塔姆':'ta mu','巴德':'ba de','菲奥娜':'fei ao na','烬':'jin','布里茨':'bu li ci','娑娜':'suo na','薇古丝':'wei gu si','慎':'shen','劫':'jie','格雷福斯':'ge lei fu si','莫甘娜':'mo gan na'};
function _py(n){return PM[n]||'';}
function _ini(n){var p=_py(n);if(!p)return '';return p.split(' ').map(function(s){return s[0];}).join('');}
function matchHero(h,q){
  if(!q)return true;
  if(h.name.indexOf(q)>=0)return true;
  var p=_py(h.name);
  if(p&&p.replace(/ /g,'').indexOf(q.replace(/ /g,''))>=0)return true;
  var ini=_ini(h.name).toLowerCase();
  if(ini&&(ini===q||ini.indexOf(q)===0))return true;
  var ext=(h.synergies.join(' ')+' '+h.role+' '+h.items.join(' ')).toLowerCase();
  if(ext.indexOf(q)>=0)return true;
  return false;
}

// Initial render
renderHeroes(HEROES);

// Search
const searchInput = document.getElementById('searchInput');
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = searchInput.value.trim().toLowerCase();
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    if (!q) { renderHeroes(HEROES); return; }
    renderHeroes(HEROES.filter(h => matchHero(h, q)));
  }, 150);
});

// Filter buttons
document.getElementById('filterButtons').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  searchInput.value = '';
  
  const filter = btn.dataset.filter;
  if (filter === 'all') {
    renderHeroes(HEROES);
    return;
  }
  
  // Cost filter
  if (/^[1-5]$/.test(filter)) {
    renderHeroes(HEROES.filter(h => h.cost === parseInt(filter)));
    return;
  }
  
  // Role filter
  renderHeroes(HEROES.filter(h => h.role.includes(filter)));
});

// Back to top
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 300);
});
